# Goal: To ensure my running application is free from OWASP Top 10 security issues
name: OWASP ZAP DAST Scan

on:
  workflow_call:

jobs:
  scan:
    runs-on: self-hosted

    steps:
      - name: Code Checkout
        uses: actions/checkout@v7

      - name: Wait for frontend to be healthy
        run: |
          timeout 60s sh -c 'until curl -sf http://localhost:8080 > /dev/null; do sleep 2; done'

      - name: Wait for backend to be healthy
        run: |
          timeout 60s sh -c 'until curl -sf http://localhost:8081/health > /dev/null; do sleep 2; done'

      - name: OWASP ZAP Baseline Scan - Frontend
        uses: zaproxy/action-baseline@v0.16.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8080'
          fail_action: false

      - name: OWASP ZAP Baseline Scan - Backend
        uses: zaproxy/action-baseline@v0.16.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:8081'
          fail_action: false