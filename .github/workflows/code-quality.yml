# Goal : I have to do SAST for my code 

name: Code Quality

on:
    workflow_call:  # Means you can call this workflow before/after any workflow

jobs:
    sast:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v7
              
            - name: Setup Nodejs
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm
                cache-dependency-path: frontend/package-lock.json

            - name: Install npm packages
              run: npm install
              working-directory: frontend

            - name: Run Linter
              run: npm run lint
              working-directory: frontend

            - name: Run tests
              run: npm run test
              working-directory: frontend

              
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version-file: backend/go.mod
                cache-dependency-path: backend/go.sum

            - name: Run Go Formatter
              run: gofmt -l .
              working-directory: backend

            - name: Run Go Vet
              run: go vet ./...
              working-directory: backend